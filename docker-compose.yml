services:
  knowledge-base:
    build:
      context: .
    environment:
      ADDR: ":8080"
      STORAGE_DIR: "/var/lib/yi-flow-knowledge-base"
      ADMIN_TOKEN: "${ADMIN_TOKEN:?set ADMIN_TOKEN}"
      KNOWLEDGE_PACK_SIGNING_KEY_BASE64: "${KNOWLEDGE_PACK_SIGNING_KEY_BASE64:-}"
      KNOWLEDGE_PACK_SIGNING_KEY_FILE: "${KNOWLEDGE_PACK_SIGNING_KEY_FILE:-}"
      MOEGIRL_API_URL: "${MOEGIRL_API_URL:-}"
      MOEGIRL_SITEMAP_INDEX_URL: "${MOEGIRL_SITEMAP_INDEX_URL:-}"
      MOEGIRL_PUBLIC_ARTICLE_ORIGIN: "${MOEGIRL_PUBLIC_ARTICLE_ORIGIN:-}"
      RAG_GATEWAY_TOKEN: "${RAG_GATEWAY_TOKEN:-}"
      WEKNORA_BASE_URL: "${WEKNORA_BASE_URL:-}"
      WEKNORA_API_KEY: "${WEKNORA_API_KEY:-}"
      WEKNORA_KB_MAP: "${WEKNORA_KB_MAP:-}"
      WEKNORA_KB_ID: "${WEKNORA_KB_ID:-}"
      WEKNORA_TIMEOUT: "${WEKNORA_TIMEOUT:-10s}"
      RAG_GATEWAY_TOP_K_MAX: "${RAG_GATEWAY_TOP_K_MAX:-8}"
    ports:
      - "127.0.0.1:18085:8080"
    volumes:
      - knowledge_base_data:/var/lib/yi-flow-knowledge-base
    restart: unless-stopped

volumes:
  knowledge_base_data:
